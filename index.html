<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>はてブ 人気エントリー</title>
<style>
  :root {
    --fg: #111;
    --fg-mute: #777;
    --fg-faint: #aaa;
    --line: #d8d8d8;
    --line-faint: #ececec;
    --bg: #fafafa;
    --hover: #f0f0f0;
    --badge-bg: #ececec;
    --badge-fg: #555;
    --error: #8a1a1a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", "Helvetica Neue", Arial, sans-serif;
    font-size: 13px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 24px 20px 60px; }

  header {
    display: flex; align-items: baseline; justify-content: space-between;
    padding-bottom: 10px; border-bottom: 1px solid var(--fg);
  }
  h1 { margin: 0; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; }
  .status {
    font-family: "SF Mono", "Menlo", "Consolas", monospace;
    font-size: 11px; color: var(--fg-mute);
    display: flex; align-items: center; gap: 10px;
  }
  .refresh {
    font-family: inherit; font-size: 11px; color: var(--fg);
    background: transparent; border: 1px solid var(--fg);
    padding: 2px 8px; cursor: pointer; border-radius: 0;
  }
  .refresh:hover { background: var(--fg); color: var(--bg); }
  .refresh:disabled { opacity: 0.4; cursor: not-allowed; }

  nav.tabs {
    display: flex; flex-wrap: wrap; gap: 0;
    border-bottom: 1px solid var(--line);
  }
  .tab {
    font-family: inherit; font-size: 12px; color: var(--fg-mute);
    background: transparent; border: none; border-bottom: 2px solid transparent;
    padding: 10px 12px; cursor: pointer; letter-spacing: 0.02em;
  }
  .tab:hover { color: var(--fg); }
  .tab.active { color: var(--fg); border-bottom: 2px solid var(--fg); font-weight: 600; }

  ol.list { list-style: none; margin: 0; padding: 0; }
  .item {
    display: grid; grid-template-columns: 36px 1fr auto;
    gap: 12px; align-items: baseline;
    padding: 10px 4px; border-bottom: 1px solid var(--line-faint);
  }
  .item:hover { background: var(--hover); }
  .num {
    font-family: "SF Mono", "Menlo", "Consolas", monospace;
    font-size: 11px; color: var(--fg-faint); text-align: right;
  }
  .item a { color: var(--fg); text-decoration: none; display: block; }
  .item a:hover .title { text-decoration: underline; text-underline-offset: 3px; }
  .title { font-size: 13.5px; line-height: 1.5; }
  .domain {
    font-family: "SF Mono", "Menlo", "Consolas", monospace;
    font-size: 10.5px; color: var(--fg-faint); margin-top: 2px;
  }
  .meta {
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  .bookmarks {
    font-family: "SF Mono", "Menlo", "Consolas", monospace;
    font-size: 10.5px; color: var(--badge-fg);
    background: var(--badge-bg);
    padding: 1px 6px; border-radius: 2px;
    min-width: 32px; text-align: center;
  }
  .time {
    font-family: "SF Mono", "Menlo", "Consolas", monospace;
    font-size: 10.5px; color: var(--fg-mute);
  }

  .state {
    padding: 30px 4px; text-align: center;
    font-size: 12px; color: var(--fg-mute);
    font-family: "SF Mono", "Menlo", "Consolas", monospace;
  }
  .state.err { color: var(--error); }

  details.debug {
    margin-top: 20px; font-family: "SF Mono", "Menlo", "Consolas", monospace;
    font-size: 10.5px; color: var(--fg-mute);
  }
  details.debug summary { cursor: pointer; padding: 4px 0; }
  details.debug pre {
    background: #f0f0f0; padding: 10px; overflow-x: auto;
    white-space: pre-wrap; word-break: break-all;
    border-left: 2px solid var(--line);
  }

  footer {
    margin-top: 30px; padding-top: 10px; border-top: 1px solid var(--line);
    font-size: 10.5px; color: var(--fg-faint);
    font-family: "SF Mono", "Menlo", "Consolas", monospace;
    display: flex; justify-content: space-between;
  }
  footer a { color: var(--fg-mute); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 520px) {
    .wrap { padding: 16px 12px 40px; }
    .item { grid-template-columns: 28px 1fr auto; gap: 8px; }
    .tab { padding: 8px 10px; font-size: 11.5px; }
    .meta { flex-direction: column; align-items: flex-end; gap: 2px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>HATENA BOOKMARK / HOT ENTRIES</h1>
    <div class="status">
      <span id="updated">―</span>
      <button class="refresh" id="refreshBtn" onclick="loadCurrent()">更新</button>
    </div>
  </header>

  <nav class="tabs" id="tabs"></nav>

  <ol class="list" id="list">
    <li class="state">読み込み中…</li>
  </ol>

  <details class="debug" id="debug" style="display:none;">
    <summary>debug log</summary>
    <pre id="debugLog"></pre>
  </details>

  <footer>
    <span>source: b.hatena.ne.jp/hotentry</span>
    <a href="https://b.hatena.ne.jp/hotentry/all" target="_blank" rel="noopener">b.hatena.ne.jp ↗</a>
  </footer>
</div>

<script>
  const CATEGORIES = [
    { key: '',              label: '総合' },
    { key: '/general',      label: '一般' },
    { key: '/social',       label: '世の中' },
    { key: '/economics',    label: '政治と経済' },
    { key: '/life',         label: '暮らし' },
    { key: '/knowledge',    label: '学び' },
    { key: '/it',           label: 'テクノロジー' },
    { key: '/entertainment',label: 'エンタメ' },
    { key: '/game',         label: 'アニメとゲーム' },
    { key: '/fun',          label: 'おもしろ' }
  ];

  function rssUrlFor(catKey) {
    return catKey
      ? `https://b.hatena.ne.jp/hotentry${catKey}.rss`
      : `https://b.hatena.ne.jp/hotentry.rss`;
  }

  const STRATEGIES = [
    {
      name: 'direct',
      build: rss => rss,
      parse: async res => parseHatenaRss(await res.text())
    },
    {
      name: 'codetabs',
      build: rss => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(rss)}`,
      parse: async res => parseHatenaRss(await res.text())
    },
    {
      name: 'allorigins-get',
      build: rss => `https://api.allorigins.win/get?url=${encodeURIComponent(rss)}`,
      parse: async res => {
        const json = await res.json();
        if (!json.contents) throw new Error('no contents');
        return parseHatenaRss(json.contents);
      }
    },
    {
      name: 'corsproxy.io',
      build: rss => `https://corsproxy.io/?url=${encodeURIComponent(rss)}`,
      parse: async res => parseHatenaRss(await res.text())
    },
    {
      name: 'rss2json',
      build: rss => `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}`,
      parse: async res => {
        const json = await res.json();
        if (json.status !== 'ok') throw new Error('rss2json: ' + (json.message || json.status));
        return (json.items || []).map(it => ({
          title:     it.title || '',
          link:      it.link  || '#',
          pubDate:   it.pubDate || '',
          bookmarks: ''
        }));
      }
    }
  ];

  function parseHatenaRss(text) {
    if (!text || text.length < 30) throw new Error('empty response');
    const xml = new DOMParser().parseFromString(text, 'application/xml');
    if (xml.querySelector('parsererror')) throw new Error('XML parse error');
    const items = Array.from(xml.querySelectorAll('item'));
    if (items.length === 0) throw new Error('no <item> found');
    return items.map(it => {
      const children = Array.from(it.children);
      const find = ln => children.find(c => c.localName === ln);
      return {
        title:     (find('title')?.textContent || '').trim(),
        link:      (find('link')?.textContent  || '#').trim(),
        pubDate:   (find('pubDate')?.textContent || find('date')?.textContent || '').trim(),
        bookmarks: (find('bookmarkcount')?.textContent || '').trim()
      };
    });
  }

  let current = '';
  let loading = false;
  const debugLog = [];

  function log(msg) {
    const t = new Date().toLocaleTimeString('ja-JP');
    debugLog.push(`[${t}] ${msg}`);
    const el = document.getElementById('debugLog');
    if (el) el.textContent = debugLog.slice(-30).join('\n');
  }

  function renderTabs() {
    const tabs = document.getElementById('tabs');
    tabs.innerHTML = '';
    CATEGORIES.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (c.key === current ? ' active' : '');
      btn.textContent = c.label;
      btn.onclick = () => {
        if (loading || current === c.key) return;
        current = c.key;
        renderTabs();
        loadCurrent();
      };
      tabs.appendChild(btn);
    });
  }

  async function tryStrategies(rssUrl) {
    let lastError;
    for (const s of STRATEGIES) {
      try {
        log(`try: ${s.name}`);
        const res = await fetch(s.build(rssUrl), { cache: 'no-store' });
        log(`  → HTTP ${res.status}`);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const items = await s.parse(res);
        log(`  ✓ ${items.length} items via ${s.name}`);
        return { items, strategy: s.name };
      } catch (e) {
        log(`  ✗ ${e.message}`);
        lastError = e;
      }
    }
    throw lastError || new Error('all strategies failed');
  }

  function domainOf(url) {
    try { return new URL(url).hostname.replace(/^www\./, ''); }
    catch { return ''; }
  }

  async function loadCurrent() {
    if (loading) return;
    loading = true;
    document.getElementById('refreshBtn').disabled = true;
    document.getElementById('debug').style.display = 'none';
    const list = document.getElementById('list');
    list.innerHTML = '<li class="state">読み込み中…</li>';

    const rssUrl = rssUrlFor(current);
    log(`load: ${current || '(総合)'}`);

    try {
      const { items, strategy } = await tryStrategies(rssUrl);
      list.innerHTML = '';
      items.forEach((it, i) => {
        const li = document.createElement('li');
        li.className = 'item';
        const domain = domainOf(it.link);
        const bookmarksHtml = it.bookmarks
          ? `<span class="bookmarks">${escapeHtml(it.bookmarks)}</span>`
          : '';
        li.innerHTML = `
          <span class="num">${String(i + 1).padStart(2, '0')}</span>
          <a href="${escapeAttr(it.link)}" target="_blank" rel="noopener">
            <div class="title">${escapeHtml(it.title)}</div>
            <div class="domain">${escapeHtml(domain)}</div>
          </a>
          <div class="meta">
            ${bookmarksHtml}
            <span class="time">${formatDate(it.pubDate)}</span>
          </div>
        `;
        list.appendChild(li);
      });
      const now = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('updated').textContent = `${now} via ${strategy}`;
    } catch (e) {
      list.innerHTML = `<li class="state err">取得に失敗しました<br>すべての取得経路でエラーが発生しました。<br>下の「debug log」で詳細を確認してください。</li>`;
      document.getElementById('updated').textContent = 'error';
      document.getElementById('debug').style.display = 'block';
      document.getElementById('debug').open = true;
    } finally {
      loading = false;
      document.getElementById('refreshBtn').disabled = false;
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }
  function escapeAttr(s) { return escapeHtml(s); }

  function formatDate(s) {
    if (!s) return '';
    const d = new Date(s);
    if (isNaN(d)) return s;
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    if (sameDay) return d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    return d.toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  }

  renderTabs();
  loadCurrent();
</script>
</body>
</html>
